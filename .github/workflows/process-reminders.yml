name: Recordatorios JMbarber

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  process-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Ejecutar recordatorios 24h
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -sS -X POST "${SUPABASE_URL}/functions/v1/process-reminders" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json"
